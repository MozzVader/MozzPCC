<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MozzPCC — Personal Command Center</title>
  <meta name="description" content="Tu centro de comando personal: reloj, tareas, pomodoro y notas.">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Supabase JS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="/MozzPCC/assets/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/MozzPCC/assets/favicon-16x16.png">
  <link rel="icon" type="image/x-icon" href="/MozzPCC/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/MozzPCC/assets/logo.png">

  <!-- Estilos propios -->
  <link rel="stylesheet" href="/MozzPCC/css/styles.css">
</head>
<body>

  <!-- ===== LOADING (mientras Supabase verifica sesión) ===== -->
  <div id="app-loading" class="app-loading">
    <div class="app-loading-spinner"></div>
  </div>

  <!-- ===== PANTALLA DE AUTENTICACIÓN ===== -->
  <div id="auth-screen" class="auth-screen" style="display:none;">
    <div id="auth-card" class="auth-card">
      <!-- Logo / Título -->
      <div class="auth-logo">
        <div class="auth-logo-icon">
          <img src="/MozzPCC/assets/logo.png" alt="MozzPCC" width="36" height="36">
        </div>
        <h1 id="auth-title" class="auth-title">MozzPCC</h1>
        <p id="auth-subtitle" class="auth-subtitle">Ingresá a tu centro de comando personal</p>
      </div>

      <!-- Formulario -->
      <form id="auth-form" class="auth-form" autocomplete="on">
        <div class="auth-input-group">
          <div class="auth-input-wrapper">
            <i class="fa-regular fa-envelope auth-input-icon"></i>
            <input type="email" id="auth-email" class="auth-input" placeholder="Correo electrónico" autocomplete="email" required>
          </div>
          <div class="auth-input-wrapper">
            <i class="fa-solid fa-lock auth-input-icon"></i>
            <input type="password" id="auth-password" class="auth-input" placeholder="Contraseña" autocomplete="current-password" required minlength="6">
            <button type="button" id="auth-password-toggle" class="auth-password-toggle" aria-label="Mostrar contraseña">
              <i class="fa-regular fa-eye-slash"></i>
            </button>
          </div>
        </div>

        <!-- Error -->
        <div id="auth-error" class="auth-error" style="display:none;"></div>

        <!-- Botón principal -->
        <button type="button" id="auth-submit-btn" class="auth-btn auth-btn-primary">
          Iniciar Sesión
        </button>

        <!-- Toggle login / register -->
        <button type="button" id="auth-toggle-btn" class="auth-toggle-btn">
          ¿No tenés cuenta? <strong>Creá una</strong>
        </button>

        <!-- Magic link -->
        <button type="button" id="auth-magic-btn" class="auth-magic-btn">
          <i class="fa-regular fa-paper-plane"></i> Enviar enlace mágico
        </button>
      </form>

      <!-- Divider -->
      <div class="auth-divider">
        <span>o continuá con</span>
      </div>

      <!-- OAuth Buttons -->
      <div class="auth-oauth">
        <button type="button" id="auth-google-btn" class="auth-btn auth-btn-oauth">
          <i class="fa-brands fa-google"></i> Google
        </button>
        <button type="button" id="auth-github-btn" class="auth-btn auth-btn-oauth">
          <i class="fa-brands fa-github"></i> GitHub
        </button>
      </div>
    </div>
  </div>

  <!-- ===== BARRA DE USUARIO ===== -->
  <div id="user-info-bar" class="user-info-bar" style="display:none;">
    <div class="user-info-content">
      <div class="user-avatar">
        <i class="fa-solid fa-user"></i>
      </div>
      <span id="user-email-display" class="user-email"></span>
      <button id="logout-btn" class="btn-logout" aria-label="Cerrar sesión">
        <i class="fa-solid fa-right-from-bracket"></i>
        <span>Salir</span>
      </button>
    </div>
  </div>

  <!-- ===== DASHBOARD ===== -->
  <main class="dashboard" id="dashboard-scroll" style="display:none;">

    <!-- ===== SECCIÓN 1: RELOJ Y SALUDO ===== -->
    <section class="snap-section section-clock" id="section-clock" aria-label="Reloj y saludo">
      <div class="snap-section-inner">
        <div class="card widget-clock">
          <p class="greeting" id="greeting"></p>
          <div class="clock-time" id="clock-time">
            00:00<span class="seconds">00</span>
          </div>
          <p class="clock-date" id="clock-date"></p>
        </div>
      </div>
    </section>

    <!-- ===== SECCIÓN 2: TAREAS + POMODORO ===== -->
    <section class="snap-section section-productivity" id="section-productivity" aria-label="Productividad">
      <div class="snap-section-inner snap-section-grid">
        <div class="card widget-tasks">
          <div class="card-header">
            <i class="fa-solid fa-list-check"></i>
            <h2>Tareas</h2>
          </div>

          <div class="task-input-container">
            <input type="text" id="task-input" placeholder="Agrega una nueva tarea..." aria-label="Nueva tarea" maxlength="120">
            <button class="btn-add" id="task-add-btn" aria-label="Agregar tarea">
              <i class="fa-solid fa-plus"></i> Agregar
            </button>
          </div>

          <p class="task-counter" id="task-counter">
            <span>0</span> / <span>0</span> completadas
          </p>

          <ul class="task-list" id="task-list"></ul>
        </div>

        <div class="card widget-pomodoro">
          <div class="card-header">
            <i class="fa-solid fa-clock-rotate-left"></i>
            <h2>Pomodoro</h2>
          </div>

          <div class="pomodoro-display">
            <svg class="pomodoro-svg" viewBox="0 0 200 200">
              <circle class="bg-ring" cx="100" cy="100" r="90"></circle>
              <circle class="progress-ring" id="pomodoro-ring" cx="100" cy="100" r="90"
                stroke-dasharray="565.48" stroke-dashoffset="0"></circle>
            </svg>
            <div class="pomodoro-time">
              <div class="time" id="pomodoro-time">25:00</div>
              <div class="label" id="pomodoro-label">Enfoque</div>
            </div>
          </div>

          <div class="pomodoro-controls">
            <button class="btn-pomodoro primary" id="pomodoro-start">
              <i class="fa-solid fa-play"></i> Iniciar
            </button>
            <button class="btn-pomodoro" id="pomodoro-reset">
              <i class="fa-solid fa-rotate-left"></i> Reiniciar
            </button>
          </div>

          <div class="pomodoro-stats">
            <div class="stat">
              <div class="stat-value" id="pomodoro-count">0</div>
              <div class="stat-label">Sesiones</div>
            </div>
            <div class="stat">
              <div class="stat-value" id="pomodoro-total">0m</div>
              <div class="stat-label">Total</div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- ===== SECCIÓN 3: NOTAS ===== -->
    <section class="snap-section section-notes" id="section-notes" aria-label="Notas rápidas">
      <div class="snap-section-inner">
        <div class="card widget-notes">
          <div class="card-header">
            <i class="fa-solid fa-note-sticky"></i>
            <h2>Notas</h2>
          </div>

          <div class="notes-toolbar">
            <button class="btn-new-note" id="new-note-btn">
              <i class="fa-solid fa-plus"></i> Nueva nota
            </button>
          </div>

          <div class="notes-grid" id="notes-grid"></div>
        </div>
      </div>
    </section>

    <!-- ===== SECCIÓN 4: FRASES ===== -->
    <section class="snap-section section-quotes" id="section-quotes" aria-label="Frase motivacional">
      <div class="snap-section-inner">
        <div class="card widget-quotes">
          <div class="card-header">
            <i class="fa-solid fa-quote-left"></i>
            <h2>Inspiracion</h2>
          </div>
          <p class="quote-text" id="quote-text"></p>
          <p class="quote-author" id="quote-author"></p>
          <button class="btn-new-quote" id="new-quote-btn">
            <i class="fa-solid fa-shuffle"></i> Nueva frase
          </button>
        </div>
      </div>
    </section>

    <!-- ===== FOOTER (dentro del scroll) ===== -->
    <footer class="footer">
      <p>MozzPCC &mdash; Personal Command Center &copy; <span id="year"></span></p>
      <p class="footer-credit">
        <a href="https://github.com/MozzVader" target="_blank" rel="noopener noreferrer">
          <i class="fa-brands fa-github"></i> MozzVader
        </a>
      </p>
    </footer>

    <!-- ===== INDICADORES DE SECCIÓN ===== -->
    <div class="section-indicators" id="section-indicators">
      <button class="section-dot active" data-section="section-clock" aria-label="Reloj"></button>
      <button class="section-dot" data-section="section-productivity" aria-label="Productividad"></button>
      <button class="section-dot" data-section="section-notes" aria-label="Notas"></button>
      <button class="section-dot" data-section="section-quotes" aria-label="Inspiración"></button>
    </div>

    <!-- ===== DOCK estilo macOS ===== -->
    <nav class="dock" id="dock">
      <div class="dock-panel">

        <!-- Grupo: Widgets -->
        <div class="dock-group" data-group="widgets">
          <div class="dock-expand">
            <button class="dock-icon" data-scroll="section-clock" aria-label="Reloj">
              <i class="fa-regular fa-clock"></i>
              <span class="dock-tooltip">Reloj</span>
            </button>
            <button class="dock-icon" data-scroll="section-productivity" aria-label="Tareas y Pomodoro">
              <i class="fa-solid fa-bolt"></i>
              <span class="dock-tooltip">Productividad</span>
            </button>
            <button class="dock-icon" data-scroll="section-notes" aria-label="Notas">
              <i class="fa-solid fa-note-sticky"></i>
              <span class="dock-tooltip">Notas</span>
            </button>
            <button class="dock-icon" data-scroll="section-quotes" aria-label="Inspiración">
              <i class="fa-solid fa-quote-left"></i>
              <span class="dock-tooltip">Inspiracion</span>
            </button>
          </div>
          <button class="dock-icon dock-trigger" aria-label="Widgets">
            <i class="fa-solid fa-grip"></i>
            <span class="dock-tooltip">Secciones</span>
          </button>
        </div>

        <div class="dock-separator"></div>

        <!-- Grupo: Links -->
        <div class="dock-group" data-group="links">
          <div class="dock-expand">
            <a class="dock-icon" href="https://github.com/MozzVader" target="_blank" rel="noopener" aria-label="GitHub">
              <i class="fa-brands fa-github"></i>
              <span class="dock-tooltip">GitHub</span>
            </a>
            <a class="dock-icon" href="https://youtube.com" target="_blank" rel="noopener" aria-label="YouTube">
              <i class="fa-brands fa-youtube"></i>
              <span class="dock-tooltip">YouTube</span>
            </a>
            <a class="dock-icon" href="https://chat.z.ai" target="_blank" rel="noopener" aria-label="Chat Z.AI">
              <i class="fa-solid fa-robot"></i>
              <span class="dock-tooltip">Chat Z.AI</span>
            </a>
          </div>
          <button class="dock-icon dock-trigger" aria-label="Links">
            <i class="fa-solid fa-globe"></i>
            <span class="dock-tooltip">Links</span>
          </button>
        </div>

      </div>
    </nav>
  </main>

  <!-- Scripts — Orden CRÍTICO -->
  <script src="/MozzPCC/js/supabase.js"></script>
  <script src="/MozzPCC/js/auth.js"></script>
  <script src="/MozzPCC/js/tasks.js"></script>
  <script src="/MozzPCC/js/pomodoro.js"></script>
  <script src="/MozzPCC/js/notes.js"></script>
  <script src="/MozzPCC/js/quotes.js"></script>
  <script src="/MozzPCC/js/app.js"></script>
  <script src="/MozzPCC/js/dock.js"></script>

</body>
</html>
